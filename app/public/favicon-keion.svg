<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">KEION OUM</title>
  <desc id="desc">Minimal black and pale blue favicon for a light music club reservation site.</desc>
  <rect x="6" y="6" width="244" height="244" rx="44" fill="#070A0C"/>

  <!-- KEION monogram -->
  <g fill="none" stroke="#CBEFF6" stroke-width="7" stroke-linecap="square" stroke-linejoin="miter">
    <!-- K -->
    <path d="M31 93V166 M31 130L63 98 M31 130L63 165"/>
    <!-- E -->
    <path d="M73 98V165 M73 98H105 M73 131H101 M73 165H105"/>

    <!-- Guitar-neck I -->
    <path d="M122 91V165"/>
    <path d="M128 91V165" stroke-width="2.8"/>
    <path d="M134 91V165" stroke-width="2.8"/>
    <path d="M121 91V58 M135 91V58"/>
    <path d="M121 58L125 51H131L135 58"/>
    <path d="M120 55H116 M120 62H116 M136 55H140 M136 62H140" stroke-width="3.2"/>

    <!-- O (open-ring, cut by guitar neck) -->
    <path d="M159 102A34 34 0 1 1 158 161"/>

    <!-- N -->
    <path d="M196 165V98 M196 98L228 165 M228 165V98"/>
  </g>

  <!-- Music note inside O -->
  <g fill="#CBEFF6">
    <ellipse cx="174" cy="138" rx="6.2" ry="5"/>
    <path d="M180 137V116l16-6v17.5c-1.8-2.3-4.4-3.5-7.1-3.5-4.9 0-8.9 3.1-8.9 7.1z"/>
  </g>

  <!-- OUM subtitle -->
  <g fill="#CBEFF6">
    <path d="M99 196c0-5.5 4.3-9.2 9.8-9.2s9.8 3.7 9.8 9.2-4.3 9.2-9.8 9.2S99 201.5 99 196zm4.2 0c0 3.2 2.3 5.3 5.6 5.3s5.6-2.1 5.6-5.3-2.3-5.3-5.6-5.3-5.6 2.1-5.6 5.3z"/>
    <path d="M127 187.2h4.1v9.6c0 3.1 1.8 4.6 4.4 4.6s4.4-1.5 4.4-4.6v-9.6h4.1v9.9c0 5.3-3.3 8.1-8.5 8.1s-8.5-2.8-8.5-8.1z"/>
    <path d="M153 205v-17.8h4.6l6.2 9.5 6.2-9.5h4.6V205h-4v-11.2l-5.5 8.2h-2.7l-5.5-8.2V205z"/>
