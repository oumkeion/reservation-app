name: Nightly Scrape

# 講義棟予約状況を毎晩スクレイピングし、構造化JSONを
# Firestore (settings/lectureHall) に書き込む。アプリは Firestore を直接読む。
# JSONのコミットはバックアップ兼リポジトリのアクティブ維持
# （60日間無コミットだと GitHub がスケジュール実行を自動停止するため）。

on:
  schedule:
    - cron: '30 15 * * *'  # UTC 15:30 = JST 0:30
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper (parse + upload to Firestore)
        run: python public/scraper_requests.py
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Commit JSON (backup + keep schedule alive)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/htmls/lecture-hall.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 nightly update $(date +'%Y-%m-%d')"
            git push origin HEAD:main
          fi
