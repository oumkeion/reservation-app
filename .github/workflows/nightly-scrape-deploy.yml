name: Nightly Scrape

on:
  schedule:
    - cron: '30 15 * * *'  # UTC 15:30 = JST 0:30
  workflow_dispatch:

permissions:
  contents: write # リポジトリへの書き込み権限を付与

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python public/scraper_requests.py

      - name: Debug cat scraper_requests.py
        run: |
          echo "=== public/scraper_requests.py ==="
          sed -n '1,40p' public/scraper_requests.py

      - name: Commit & Push HTMLs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/htmls
          git commit --allow-empty -m "🔄 nightly update $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          channelId: live
          projectId: keionbushitu-reserbvation
